<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaya krishnaJ Portfolio</title>
</head>

<body>

    <!-- Header -->
    <header>
        <h1> Jaya krishnaPortfolio</h1>
        <nav>
            <ul>
                <li><a href="#about">About</a></li>
                <li><a href="#skills">Skills</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content -->
    <main>

        <!-- About Section -->
        <section id="about">
            <h2>About Me</h2>
            <img src="jaya.jpeg" alt="Profile picture of the user" width="150px" height="150px">
            <p>
                Hello! I am a beginner web developer learning HTML, CSS, and JavaScript.
                I enjoy building simple and clean websites.
            </p>

            
        </section>

        <!-- Skills Section -->
        <section id="skills">
            <h2>My Skills</h2>
            <img src="https://via.placeholder.com/300" alt="Skills illustration showing coding icons">
            <ul>
                <li>HTML</li>
                <li>CSS</li>
                <li>JavaScript</li>
            </ul>
        </section>

        <!-- Contact Section -->
        <section id="contact">
            <h2>Contact Me</h2>
            <img src="https://via.placeholder.com/300" alt="Contact illustration with email and phone icons">

            <form action="#" method="post">
                
                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name" required><br><br>

                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required><br><br>

                <label for="message">Message:</label><br>
                <textarea id="message" name="message" rows="4" required></textarea><br><br>

                <button type="submit">Send</button>
            </form>
        </section>

    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 My Portfolio. All rights reserved.</p>
    </footer>

</body>
</html>
